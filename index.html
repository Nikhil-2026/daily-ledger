<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Ledger</title>
<style>
:root{
  --bg:#f4f5f7; --card:#ffffff; --border:#e2e4e9; --text:#1d2127; --muted:#6b7280;
  --accent:#2563eb; --green:#16a34a; --red:#dc2626; --amber:#d97706; --radius:10px;
}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);}
.wrap{max-width:1000px;margin:0 auto;padding:16px;}
header{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px;}
h1{font-size:20px;margin:0;}
.sub{color:var(--muted);font-size:13px;}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
select, input, button, textarea{font-family:inherit;font-size:14px;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--text);}
button{cursor:pointer;background:var(--accent);color:#fff;border:none;font-weight:600;}
button.secondary{background:#fff;color:var(--text);border:1px solid var(--border);}
button.danger{background:var(--red);}
button:active{transform:scale(0.98);}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:14px;}
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px;}
.summary .box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;}
.summary .box .lbl{font-size:12px;color:var(--muted);margin-bottom:4px;}
.summary .box .val{font-size:19px;font-weight:700;}
.green{color:var(--green);} .red{color:var(--red);} .amber{color:var(--amber);}
.months{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;}
.month{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px;}
.month h3{margin:0 0 8px;font-size:14px;text-align:center;}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.dow{font-size:10px;color:var(--muted);text-align:center;}
.day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:12px;border-radius:6px;cursor:pointer;position:relative;border:1px solid transparent;}
.day:hover{border-color:var(--accent);}
.day.empty{cursor:default;}
.day.has-data{background:#eef4ff;font-weight:700;}
.day.today{outline:2px solid var(--accent);}
.dot{position:absolute;bottom:2px;width:4px;height:4px;border-radius:50%;background:var(--green);}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;z-index:50;padding:14px;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:12px;padding:18px;max-width:380px;width:100%;max-height:90vh;overflow:auto;}
.modal h2{margin:0 0 12px;font-size:16px;}
.field{margin-bottom:10px;}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;}
.field input, .field textarea{width:100%;}
.modal-actions{display:flex;gap:8px;margin-top:14px;}
.modal-actions button{flex:1;}
.ledger-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.ledger-tabs button{background:#fff;color:var(--text);border:1px solid var(--border);font-weight:500;}
.ledger-tabs button.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.small{font-size:11px;color:var(--muted);}
.auth-wrap{max-width:380px;margin:60px auto;}
.hidden{display:none;}
.activity-log{max-height:160px;overflow:auto;font-size:12px;color:var(--muted);}
.activity-log div{padding:4px 0;border-bottom:1px solid var(--border);}
.tabbar{display:flex;gap:8px;margin-bottom:14px;border-bottom:1px solid var(--border);}
.tabbar button{background:none;border:none;color:var(--muted);font-weight:600;padding:8px 4px;border-bottom:2px solid transparent;}
.tabbar button.active{color:var(--accent);border-bottom-color:var(--accent);}
.due-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.due-item:last-child{border-bottom:none;}
</style>
</head>
<body>

<div class="wrap auth-wrap" id="authScreen">
  <div class="card">
    <h1 style="margin-bottom:4px;">Daily Ledger</h1>
    <p class="sub" style="margin-bottom:16px;">Sign in to your private ledger</p>
    <div class="field"><label>Email</label><input type="email" id="authEmail" placeholder="you@example.com"></div>
    <div class="field"><label>Password</label><input type="password" id="authPassword" placeholder="At least 6 characters"></div>
    <div class="row" style="margin-top:12px;">
      <button id="loginBtn" style="flex:1;">Log in</button>
      <button id="signupBtn" class="secondary" style="flex:1;">Sign up</button>
    </div>
    <p id="authError" class="small" style="color:var(--red);margin-top:10px;"></p>
  </div>
</div>

<div class="wrap hidden" id="appScreen">
  <header>
    <div>
      <h1>Daily Ledger</h1>
      <div class="sub" id="userEmailLabel"></div>
    </div>
    <div class="row">
      <select id="yearSelect"></select>
      <button class="secondary" id="exportBtn">Export CSV</button>
      <button class="secondary" id="logoutBtn">Log out</button>
    </div>
  </header>

  <div class="ledger-tabs" id="ledgerTabs"></div>
  <div class="tabbar" id="mainTabs">
    <button class="active" data-tab="calendar">Calendar</button>
    <button data-tab="dues">Pending dues</button>
    <button data-tab="activity">Activity log</button>
  </div>

  <div id="content"></div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="modalTitle">Entry</h2>
    <div class="field"><label>Money spent</label><input type="number" id="fSpent" placeholder="0" step="0.01"></div>
    <div class="field"><label>Money received</label><input type="number" id="fReceived" placeholder="0" step="0.01"></div>
    <div class="field"><label>Business income</label><input type="number" id="fBusiness" placeholder="0" step="0.01"></div>
    <div class="field"><label>Person / customer name (optional)</label><input type="text" id="fPerson" placeholder="e.g. Ramesh"></div>
    <div class="field"><label>Notes</label><textarea id="fNotes" rows="2" placeholder="optional"></textarea></div>
    <div class="modal-actions">
      <button class="secondary" id="cancelBtn">Cancel</button>
      <button id="saveBtn">Save</button>
    </div>
    <div class="modal-actions">
      <button class="danger" id="deleteBtn" style="display:none;">Delete entry</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="ledgerModalBg">
  <div class="modal">
    <h2>New ledger</h2>
    <div class="field"><label>Name (e.g. Father's Business, Brother's Company)</label><input type="text" id="newLedgerName" placeholder="Name"></div>
    <div class="modal-actions">
      <button class="secondary" id="cancelLedgerBtn">Cancel</button>
      <button id="saveLedgerBtn">Create</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="dueModalBg">
  <div class="modal">
    <h2>Add pending due</h2>
    <div class="field"><label>Type</label>
      <select id="dueType"><option value="owed_to_me">Owed to me</option><option value="i_owe">I owe</option></select>
    </div>
    <div class="field"><label>Person name</label><input type="text" id="duePerson" placeholder="e.g. Ramesh"></div>
    <div class="field"><label>Amount</label><input type="number" id="dueAmount" placeholder="0" step="0.01"></div>
    <div class="field"><label>Due date (optional)</label><input type="date" id="dueDate"></div>
    <div class="field"><label>Notes</label><textarea id="dueNotes" rows="2"></textarea></div>
    <div class="modal-actions">
      <button class="secondary" id="cancelDueBtn">Cancel</button>
      <button id="saveDueBtn">Save</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCoPlIIo43iOLdntUOow5gijnJdnG_fVu8",
  authDomain: "daily-ledger-a9167.firebaseapp.com",
  projectId: "daily-ledger-a9167",
  storageBucket: "daily-ledger-a9167.firebasestorage.app",
  messagingSenderId: "10056005863",
  appId: "1:10056005863:web:4c4ae8020605f9b0e8ca42"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DOW = ["S","M","T","W","T","F","S"];
let currentUser = null;
let state = { ledgers: {}, activeLedger: null, dues: [], activity: [] };
let currentYear = new Date().getFullYear();
let editingDate = null;
let currentTab = 'calendar';

function fmt(n){ n = Number(n)||0; return n.toLocaleString(undefined,{maximumFractionDigits:2}); }
function pad(n){ return String(n).padStart(2,'0'); }
function dateKey(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }
function nowStr(){ return new Date().toLocaleString(); }

function userDocRef(){ return db.collection('users').doc(currentUser.uid); }

async function loadState(){
  const snap = await userDocRef().get();
  if(snap.exists){
    state = snap.data();
    if(!state.dues) state.dues = [];
    if(!state.activity) state.activity = [];
  } else {
    const id = 'ledger_' + Date.now();
    state = { ledgers: { [id]: { name: "My ledger", entries: {} } }, activeLedger: id, dues: [], activity: [] };
    await saveState();
  }
  if(!state.activeLedger || !state.ledgers[state.activeLedger]){
    state.activeLedger = Object.keys(state.ledgers)[0];
  }
}

async function saveState(){
  try{ await userDocRef().set(state); }catch(e){ console.error('save failed', e); }
}

function logActivity(text){
  state.activity = state.activity || [];
  state.activity.unshift(`${nowStr()} — ${text}`);
  state.activity = state.activity.slice(0, 200);
}

function renderYearSelect(){
  const sel = document.getElementById('yearSelect');
  sel.innerHTML = '';
  const now = new Date().getFullYear();
  for(let y = now - 5; y <= now + 1; y++){
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y;
    if(y === currentYear) opt.selected = true;
    sel.appendChild(opt);
  }
  sel.onchange = () => { currentYear = Number(sel.value); render(); };
}

function renderTabs(){
  const tabs = document.getElementById('ledgerTabs');
  tabs.innerHTML = '';
  Object.keys(state.ledgers).forEach(id => {
    const btn = document.createElement('button');
    btn.textContent = state.ledgers[id].name;
    if(id === state.activeLedger) btn.classList.add('active');
    btn.onclick = () => { state.activeLedger = id; saveState(); render(); };
    tabs.appendChild(btn);
  });
  const addBtn = document.createElement('button');
  addBtn.textContent = '+ Add ledger';
  addBtn.onclick = () => { document.getElementById('newLedgerName').value=''; document.getElementById('ledgerModalBg').classList.add('open'); };
  tabs.appendChild(addBtn);

  if(Object.keys(state.ledgers).length > 1){
    const delBtn = document.createElement('button');
    delBtn.textContent = 'Delete current ledger';
    delBtn.className = 'danger';
    delBtn.onclick = async () => {
      if(confirm('Delete ledger "' + state.ledgers[state.activeLedger].name + '"? This cannot be undone.')){
        const name = state.ledgers[state.activeLedger].name;
        delete state.ledgers[state.activeLedger];
        state.activeLedger = Object.keys(state.ledgers)[0];
        logActivity(`Deleted ledger "${name}"`);
        await saveState();
        render();
      }
    };
    tabs.appendChild(delBtn);
  }
}

function getLedger(){ return state.ledgers[state.activeLedger]; }

function renderSummary(){
  const ledger = getLedger();
  let spent=0, received=0, business=0;
  Object.keys(ledger.entries).forEach(k => {
    if(k.startsWith(String(currentYear)+'-')){
      const e = ledger.entries[k];
      spent += Number(e.spent)||0;
      received += Number(e.received)||0;
      business += Number(e.business)||0;
    }
  });
  const net = received + business - spent;
  return `
    <div class="summary">
      <div class="box"><div class="lbl">Spent (${currentYear})</div><div class="val red">${fmt(spent)}</div></div>
      <div class="box"><div class="lbl">Received (${currentYear})</div><div class="val green">${fmt(received)}</div></div>
      <div class="box"><div class="lbl">Business income (${currentYear})</div><div class="val amber">${fmt(business)}</div></div>
      <div class="box"><div class="lbl">Net (${currentYear})</div><div class="val">${fmt(net)}</div></div>
    </div>
  `;
}

function renderCalendar(){
  let html = '<div class="months">';
  for(let m=0; m<12; m++){
    const firstDay = new Date(currentYear, m, 1).getDay();
    const daysInMonth = new Date(currentYear, m+1, 0).getDate();
    html += `<div class="month"><h3>${MONTHS[m]}</h3><div class="cal">`;
    DOW.forEach(d => html += `<div class="dow">${d}</div>`);
    for(let i=0;i<firstDay;i++) html += `<div class="day empty"></div>`;
    const todayStr = new Date().toISOString().slice(0,10);
    for(let d=1; d<=daysInMonth; d++){
      const key = dateKey(currentYear, m, d);
      const hasData = getLedger().entries[key];
      const isToday = key === todayStr;
      html += `<div class="day ${hasData?'has-data':''} ${isToday?'today':''}" data-key="${key}" onclick="openDay('${key}')">${d}${hasData?'<span class="dot"></span>':''}</div>`;
    }
    html += `</div></div>`;
  }
  html += '</div>';
  return html;
}

function renderDues(){
  const owedToMe = state.dues.filter(d => d.type === 'owed_to_me');
  const iOwe = state.dues.filter(d => d.type === 'i_owe');
  function list(items, emptyText){
    if(items.length === 0) return `<p class="small">${emptyText}</p>`;
    return items.map((d) => `
      <div class="due-item">
        <div><b>${d.person}</b> — ${fmt(d.amount)}${d.dueDate ? ' · due '+d.dueDate : ''}${d.notes ? ' · '+d.notes : ''}</div>
        <button class="secondary" style="padding:4px 8px;font-size:12px;" onclick="resolveDue('${d.id}')">Mark settled</button>
      </div>`).join('');
  }
  return `
    <div class="card">
      <h3 style="margin:0 0 8px;font-size:15px;">Owed to me</h3>
      ${list(owedToMe, 'Nothing pending.')}
    </div>
    <div class="card">
      <h3 style="margin:0 0 8px;font-size:15px;">I owe</h3>
      ${list(iOwe, 'Nothing pending.')}
    </div>
    <button id="addDueBtn">+ Add pending due</button>
  `;
}

function renderActivity(){
  if(!state.activity || state.activity.length === 0) return `<p class="small">No activity yet.</p>`;
  return `<div class="card"><div class="activity-log">${state.activity.map(a => `<div>${a}</div>`).join('')}</div></div>`;
}

function render(){
  renderYearSelect();
  renderTabs();
  document.querySelectorAll('#mainTabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === currentTab));
  const content = document.getElementById('content');
  if(currentTab === 'calendar'){
    content.innerHTML = renderSummary() + renderCalendar();
  } else if(currentTab === 'dues'){
    content.innerHTML = renderDues();
    document.getElementById('addDueBtn').onclick = () => {
      document.getElementById('duePerson').value='';
      document.getElementById('dueAmount').value='';
      document.getElementById('dueDate').value='';
      document.getElementById('dueNotes').value='';
      document.getElementById('dueModalBg').classList.add('open');
    };
  } else if(currentTab === 'activity'){
    content.innerHTML = renderActivity();
  }
}

window.openDay = function(key){
  editingDate = key;
  const entry = getLedger().entries[key] || {};
  document.getElementById('modalTitle').textContent = key;
  document.getElementById('fSpent').value = entry.spent ?? '';
  document.getElementById('fReceived').value = entry.received ?? '';
  document.getElementById('fBusiness').value = entry.business ?? '';
  document.getElementById('fPerson').value = entry.person ?? '';
  document.getElementById('fNotes').value = entry.notes ?? '';
  document.getElementById('deleteBtn').style.display = getLedger().entries[key] ? 'block' : 'none';
  document.getElementById('modalBg').classList.add('open');
};

window.resolveDue = async function(id){
  state.dues = state.dues.filter(d => d.id !== id);
  logActivity(`Marked a due as settled`);
  await saveState();
  render();
};

document.getElementById('mainTabs').addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if(!btn) return;
  currentTab = btn.dataset.tab;
  render();
});

document.getElementById('cancelBtn').onclick = () => document.getElementById('modalBg').classList.remove('open');

document.getElementById('saveBtn').onclick = async () => {
  const spent = document.getElementById('fSpent').value;
  const received = document.getElementById('fReceived').value;
  const business = document.getElementById('fBusiness').value;
  const person = document.getElementById('fPerson').value;
  const notes = document.getElementById('fNotes').value;
  if(!spent && !received && !business && !notes && !person){
    delete getLedger().entries[editingDate];
    logActivity(`Removed entry for ${editingDate}`);
  } else {
    getLedger().entries[editingDate] = { spent: spent||0, received: received||0, business: business||0, person: person||'', notes: notes||'' };
    logActivity(`Saved entry for ${editingDate} (spent ${fmt(spent||0)}, received ${fmt(received||0)}, business ${fmt(business||0)})`);
  }
  await saveState();
  document.getElementById('modalBg').classList.remove('open');
  render();
};

document.getElementById('deleteBtn').onclick = async () => {
  delete getLedger().entries[editingDate];
  logActivity(`Deleted entry for ${editingDate}`);
  await saveState();
  document.getElementById('modalBg').classList.remove('open');
  render();
};

document.getElementById('cancelLedgerBtn').onclick = () => document.getElementById('ledgerModalBg').classList.remove('open');
document.getElementById('saveLedgerBtn').onclick = async () => {
  const name = document.getElementById('newLedgerName').value.trim();
  if(!name) return;
  const id = 'ledger_' + Date.now();
  state.ledgers[id] = { name, entries: {} };
  state.activeLedger = id;
  logActivity(`Created ledger "${name}"`);
  await saveState();
  document.getElementById('ledgerModalBg').classList.remove('open');
  render();
};

document.getElementById('cancelDueBtn').onclick = () => document.getElementById('dueModalBg').classList.remove('open');
document.getElementById('saveDueBtn').onclick = async () => {
  const person = document.getElementById('duePerson').value.trim();
  const amount = document.getElementById('dueAmount').value;
  if(!person || !amount) return;
  state.dues.push({
    id: 'due_' + Date.now(),
    type: document.getElementById('dueType').value,
    person, amount,
    dueDate: document.getElementById('dueDate').value,
    notes: document.getElementById('dueNotes').value
  });
  logActivity(`Added pending due: ${person} — ${fmt(amount)}`);
  await saveState();
  document.getElementById('dueModalBg').classList.remove('open');
  render();
};

document.getElementById('exportBtn').onclick = () => {
  const ledger = getLedger();
  let csv = 'Date,Spent,Received,Business Income,Person,Notes\n';
  Object.keys(ledger.entries).sort().forEach(k => {
    if(k.startsWith(String(currentYear)+'-')){
      const e = ledger.entries[k];
      csv += `${k},${e.spent||0},${e.received||0},${e.business||0},"${(e.person||'').replace(/"/g,'')}","${(e.notes||'').replace(/"/g,'')}"\n`;
    }
  });
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${ledger.name}-${currentYear}.csv`;
  a.click();
  URL.revokeObjectURL(url);
};

document.getElementById('logoutBtn').onclick = () => auth.signOut();

document.getElementById('loginBtn').onclick = async () => {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  document.getElementById('authError').textContent = '';
  try{ await auth.signInWithEmailAndPassword(email, password); }
  catch(e){ document.getElementById('authError').textContent = e.message; }
};

document.getElementById('signupBtn').onclick = async () => {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  document.getElementById('authError').textContent = '';
  try{ await auth.createUserWithEmailAndPassword(email, password); }
  catch(e){ document.getElementById('authError').textContent = e.message; }
};

auth.onAuthStateChanged(async (user) => {
  if(user){
    currentUser = user;
    document.getElementById('authScreen').classList.add('hidden');
    document.getElementById('appScreen').classList.remove('hidden');
    document.getElementById('userEmailLabel').textContent = user.email;
    await loadState();
    render();
  } else {
    currentUser = null;
    document.getElementById('authScreen').classList.remove('hidden');
    document.getElementById('appScreen').classList.add('hidden');
  }
});
</script>
</body>
</html>
